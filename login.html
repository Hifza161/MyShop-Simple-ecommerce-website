<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MyShop</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

  <!-- Floating background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-wrapper">

    <!-- Left: branding panel -->
    <div class="login-brand">
      <div class="brand-logo-wrap">
        <img src="images/ChatGPT Image Apr 11, 2026, 05_11_48 PM.png" class="brand-logo" alt="MyShop">
      </div>
      <h1 class="brand-name">MyShop</h1>
      <p class="brand-tagline">Your style, your story ✨</p>

      <div class="brand-features">
        <div class="brand-feat"><span>🛍️</span> 27+ curated products</div>
        <div class="brand-feat"><span>🚚</span> Free delivery on all orders</div>
        <div class="brand-feat"><span>❤️</span> Save your favourites</div>
        <div class="brand-feat"><span>🔒</span> Safe & secure checkout</div>
      </div>
    </div>

    <!-- Right: login form -->
    <div class="login-card" id="login-card">

      <div class="login-card-header">
        <div class="login-avatar">
          <img src="images/Gemini_Generated_Image_ln9qpnln9qpnln9q.png" class="card-hero-img" alt="MyShop">
        </div>
        <h2>Welcome back!</h2>
        <p>Sign in to continue shopping</p>
      </div>

      <div class="login-form">

        <!-- Username field -->
        <div class="login-field" id="field-username">
          <label for="inp-username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="inp-username"
              placeholder="Enter your username"
              autocomplete="username"
              oninput="clearError('field-username')"
              onkeydown="handleEnter(event)"
            >
          </div>
          <p class="field-error" id="err-username"></p>
        </div>

        <!-- Password field -->
        <div class="login-field" id="field-password">
          <label for="inp-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="inp-password"
              placeholder="Enter your password"
              autocomplete="current-password"
              oninput="clearError('field-password')"
              onkeydown="handleEnter(event)"
            >
            <button class="eye-btn" id="eye-btn" onclick="togglePassword()" type="button" tabindex="-1" aria-label="Toggle password visibility">
              <span id="eye-icon">👁️</span>
            </button>
          </div>
          <p class="field-error" id="err-password"></p>
        </div>

        <!-- Global error (wrong credentials) -->
        <div class="login-error-box hidden" id="login-error-box">
          <span class="error-icon">⚠️</span>
          <span id="login-error-msg">Wrong username or password.</span>
        </div>

        <!-- Submit -->
        <button class="login-btn" id="login-btn" onclick="login()">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="btn-spinner hidden">⏳</span>
        </button>

        <p class="login-hint">
          <span>Hint:</span> username <strong>hifza</strong> · password <strong>1234</strong>
        </p>

      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
